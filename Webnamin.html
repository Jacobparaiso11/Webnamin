<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Love Story | Jacob & Nicole</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --pure-white: #FFFFFF;
            --electric-blue: #0077FF;
            --deep-black: #0A0A0A;
            --muted-gray: #666666;
            --transition-speed: 0.8s;
            --heading-font: 'Playfair Display', serif;
            --body-font: 'Poppins', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--body-font);
            background-color: var(--pure-white);
            color: var(--deep-black);
            overflow: hidden; 
            height: 100vh;
        }

        #lock-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 1.2s cubic-bezier(0.85, 0, 0.15, 1);
        }

        .lock-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            padding: 50px 40px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 400px;
        }

        .lock-card h2 { 
            font-family: var(--heading-font); 
            color: white;
            font-size: 1.8rem;
            margin-bottom: 10px;
            letter-spacing: 3px;
        }

        .lock-card p {
            color: rgba(255,255,255,0.5);
            font-size: 0.75rem;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .password-input {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 15px;
            width: 100%;
            border-radius: 12px;
            color: white;
            text-align: center;
            font-size: 1.2rem;
            outline: none;
            letter-spacing: 8px;
            transition: all 0.4s;
        }

        .password-input:focus { 
            border-color: var(--electric-blue);
            background: rgba(0, 119, 255, 0.05);
            box-shadow: 0 0 20px rgba(0, 119, 255, 0.2);
        }

        .navbar {
            position: fixed;
            top: 20px; width: 100%;
            z-index: 1000;
            display: flex;
            justify-content: center;
        }

        .nav-container {
            background: var(--deep-black);
            padding: 8px;
            border-radius: 12px;
            display: flex;
            gap: 5px;
        }

        .nav-link {
            text-decoration: none;
            color: var(--pure-white);
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: 0.3s;
            cursor: pointer;
            opacity: 0.5;
        }

        .nav-link.active { background: var(--electric-blue); opacity: 1; }

        .tab-section {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding-top: 100px; 
            padding-bottom: 20px;
            visibility: hidden;
            opacity: 0;
            transform: translateY(20px);
            transition: all var(--transition-speed) cubic-bezier(0.2, 1, 0.3, 1);
        }

        .tab-section.active {
            visibility: visible;
            opacity: 1;
            transform: translateY(0);
        }

        .home-content { text-align: center; width: 100%; max-width: 900px; }
        .top-quote { font-family: var(--heading-font); font-style: italic; font-size: 1.1rem; color: var(--muted-gray); margin-bottom: 5px; }
        .intro-title { font-family: var(--heading-font); font-size: 2.8rem; margin-bottom: 10px; }
        .video-box { width: 90%; max-width: 800px; height: 45vh; margin: 0 auto 15px; border-radius: 20px; overflow: hidden; box-shadow: 0 30px 60px rgba(0,0,0,0.15); }
        video { width: 100%; height: 100%; object-fit: cover; }

        .content-wrap {
            max-width: 1100px;
            width: 95%;
            height: 80vh;
            overflow-y: auto;
            scrollbar-width: none;
            padding: 20px;
        }
        .content-wrap::-webkit-scrollbar { display: none; }

        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }

        .photo-grid img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 15px;
            transition: transform 0.5s ease;
            cursor: pointer;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .photo-grid img:hover { transform: scale(1.03); }

        .message-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .message-card { background: white; border-left: 4px solid var(--electric-blue); padding: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.04); }

        #timer { display: flex; justify-content: center; gap: 25px; }
        .timer-val { font-family: var(--heading-font); font-size: 2.2rem; font-weight: 700; line-height: 1; }
        .timer-sub { font-size: 0.6rem; color: var(--electric-blue); font-weight: 600; }
    </style>
</head>
<body>

    <div id="lock-screen">
        <div class="lock-card">
            <div style="font-size: 2rem; margin-bottom: 10px;">🔒</div>
            <h2>Our Website</h2>
            <p>Enter The Password</p>
            <input type="password" id="passInput" class="password-input" placeholder="••••••" oninput="checkPass()">
            <p id="error-msg" style="color: #ff4d4d; font-size: 0.6rem; margin-top: 15px; opacity: 0; text-transform: none;">That's not it, love. Try again.</p>
        </div>
    </div>

    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-link active" onclick="showTab('home')">Home</div>
            <div class="nav-link" onclick="showTab('gallery')">Photos</div>
            <div class="nav-link" onclick="showTab('messages')">Messages</div>
            <div class="nav-link" onclick="showTab('Anniversary')">Anniversary</div>
        </div>
    </nav>

    <div id="home" class="tab-section active">
        <div class="home-content">
            <p class="top-quote">"You'll be with me wherever I go"</p>
            <h1 class="intro-title">Our Memories</h1>
            <div class="video-box">
                <video autoplay muted loop playsinline>
                    <source src="https://assets.mixkit.co/videos/preview/mixkit-couple-walking-in-the-sea-at-sunset-1530-large.mp4" type="video/mp4">
                </video>
            </div>
            <p style="font-size:0.6rem; letter-spacing:2px; color:var(--muted-gray); margin-bottom:10px;">DAYS OF LOVING YOU</p>
            <div id="timer">
                <div class="timer-unit"><span id="days" class="timer-val">00</span><br><span class="timer-sub">DAYS</span></div>
                <div class="timer-unit"><span id="hours" class="timer-val">00</span><br><span class="timer-sub">HOURS</span></div>
                <div class="timer-unit"><span id="minutes" class="timer-val">00</span><br><span class="timer-sub">MINS</span></div>
                <div class="timer-unit"><span id="seconds" class="timer-val">00</span><br><span class="timer-sub">SECS</span></div>
            </div>
        </div>
    </div>

    <div id="gallery" class="tab-section">
        <div class="content-wrap">
            <h2 style="text-align:center; font-family:var(--heading-font); font-size: 2.2rem; margin-bottom:30px;">Picture Gallery</h2>
            <div class="photo-grid">
                <img src="Picnamin1.jpg" alt="Memory 1">
                <img src="Picnamin2.jpg" alt="Memory 2">
                <img src="Picnamin3.jpg" alt="Memory 3">
                <img src="Picnamin4.jpg" alt="Memory 4">
                <img src="Picnamin5.jpg" alt="Memory 5">
                <img src="Picnamin6.jpg" alt="Memory 6">
                <img src="Picnamin7.jpg" alt="Memory 7">
                <img src="Picnamin8.jpg" alt="Memory 8">
                <img src="Picnamin9.jpg" alt="Memory 9">
                <img src="Picnamin10.jpg" alt="Memory 10">
                <img src="Picnamin11.jpg" alt="Memory 11">
                <img src="Picnamin12.jpg" alt="Memory 12">
                <img src="Picnamin13.jpg" alt="Memory 13">
                <img src="Picnamin14.jpg" alt="Memory 14">
                <img src="Picnamin15.jpg" alt="Memory 15">
            </div>
        </div>
    </div>

    <div id="messages" class="tab-section">
        <div class="content-wrap">
            <h2 style="text-align:center; font-family:var(--heading-font); font-size: 2.2rem; margin-bottom:25px;">Love Letters</h2>
            <div class="message-grid" id="message-container"></div>
        </div>
    </div>

    <div id="Anniversary" class="tab-section">
        <div class="content-wrap">
             <h2 style="text-align:center; font-family:var(--heading-font); font-size: 2.2rem; margin-bottom:25px;">Our Journey</h2>
        </div>
    </div>

r u kahit na anong mangyare, siguro naman naputunayan ko nayan sayo, na hinding hindi mawawala yan kahit saan at anong sitwasyon ang pag daanan natin. Gustoo ko lang na sana mas tumagal pa tayo, at maging tayo na talaga, sana maging asawa talaga kita, alam mo kung bakit sana, baka kasi gumising ka isang araw hindi mo nako mahal. alam ko naman na hindi basta basta mawawala yang love mo pero sana kahit na ganon, piliin mo parin ako, ako parin ang piliin mo. kung dumating man yung oras na hindi mo nako mahal, hayaan mo lang akong mahalin ka, hanggang dumating sa puntong handa ka ng mahalin ulit ako, hinding hindi mawawala yung love ko para sayo, hinding hindi yun ma aalis ng kahit ano, at kahit pa na sobrang daming misunderstanding ang dumaan sating dalawa mahal kita, at hindi na mag babago yun." 
            },

            },
            { month: "March", sender: "Jacob", text: "..." },
            { month: "March", sender: "Nicole", text: "..." },

            { month: "December", sender: "Nicole", text: "..." },
            { month: "January", sender: "Jacob", text: "..." },
            { month: "January", sender: "Nicole", text: "..." }
        ];

        function checkPass() {
            const pass = document.getElementById('passInput').value;
            const lock = document.getElementById('lock-screen');
            const error = document.getElementById('error-msg');
            
            if (pass === '021326') {
                lock.style.transform = 'translateY(-100%)';
                setTimeout(() => lock.style.display = 'none', 1200);
            } else if (pass.length >= 6) {
                error.style.opacity = '1';
            } else {
                error.style.opacity = '0';
            }
        }

        function showTab(tabId) {
            const links = document.querySelectorAll('.nav-link');
            links.forEach(link => {
                link.classList.remove('active');
                if (link.getAttribute('onclick').includes(tabId)) link.classList.add('active');
            });
            const sections = document.querySelectorAll('.tab-section');
            sections.forEach(section => section.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
        }

        
        const container = document.getElementById('message-container');
        myLoveLetters.forEach(msg => {
            const card = document.createElement('div');
            card.className = 'message-card';
            card.innerHTML = `<span style="font-size:0.7rem; color:var(--electric-blue); font-weight:600; text-transform:uppercase;">${msg.month} • ${msg.sender}</span>
                              <p style="font-family:var(--heading-font); font-size:1rem; margin-top:5px;">"${msg.text}"</p>`;
            container.appendChild(card);
        });

        const startDate = new Date("February 13, 2026 00:00:00").getTime();
        function updateTimer() {
            const now = new Date().getTime();
            const diff = now - startDate;
            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);
            document.getElementById("days").innerText = d;
            document.getElementById("hours").innerText = h < 10 ? "0"+h : h;
            document.getElementById("minutes").innerText = m < 10 ? "0"+m : m;
            document.getElementById("seconds").innerText = s < 10 ? "0"+s : s;
        }
        setInterval(updateTimer, 1000);
        updateTimer();
    </script>
</body>
</html>
